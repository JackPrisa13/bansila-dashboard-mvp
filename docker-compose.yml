services:
  # 1. The Data Warehouse MVP (MySQL)
  mysql-warehouse:
    image: mysql:8.0
    container_name: bansila_mysql
    environment:
      MYSQL_ROOT_PASSWORD: bansila_root
      MYSQL_DATABASE: bansila_analytics
      MYSQL_USER: bansila
      MYSQL_PASSWORD: bansila123
    # Metabase must not start until MySQL finishes first-time init (e.g. large audits.sql import).
    # Otherwise JDBC gets "Connection refused" — depends_on alone only waits for the container to start.
    command: --innodb_buffer_pool_size=1G
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h 127.0.0.1 -P 3306 -uroot -p$$MYSQL_ROOT_PASSWORD -e 'SELECT 1' >/dev/null 2>&1 || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 600s
    ports:
      - "3306:3306"
    volumes:
      # Any .sql scripts here run automatically when the DB first boots
      - ./data-warehouse-init:/docker-entrypoint-initdb.d
      # MySQL will ONLY allow LOAD DATA INFILE commands from this specific path
      - ./raw-data:/var/lib/mysql-files
      # Persists the database so it doesn't wipe when the container stops
      - mysql_data:/var/lib/mysql
    networks:
      - mvp_network

  # 2. The BI Presentation Layer (Metabase)
  metabase:
    image: metabase/metabase:latest
    container_name: bansila_dashboard
    ports:
      - "3000:3000"
    # environment:
      # # Tell Metabase to store its internal config in our MySQL DB
      # MB_DB_TYPE: mysql
      # # MySQL 8 default auth (caching_sha2_password) needs this or the JDBC client fails with
      # # "RSA public key is not available client side" — without it Metabase exits and :3000 never listens.
      # MB_DB_CONNECTION_URI: jdbc:mysql://mysql-warehouse:3306/bansila_analytics?user=bansila&password=bansila123&allowPublicKeyRetrieval=true
    depends_on:
      mysql-warehouse:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mvp_network

networks:
  mvp_network:
    driver: bridge

volumes:
  mysql_data:
