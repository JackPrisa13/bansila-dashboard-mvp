services:
  mysql-warehouse:
    image: mysql:8.0
    container_name: bansila_mysql
    environment:
      MYSQL_ROOT_PASSWORD: bansila_root
      MYSQL_DATABASE: bansila_analytics
      MYSQL_USER: bansila
      MYSQL_PASSWORD: bansila123
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - ./data-warehouse-init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    networks:
      - mvp_network

  metabase:
    image: metabase/metabase:latest
    container_name: bansila_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - ./metabase-data:/metabase-data
    depends_on:
      - mysql-warehouse
    restart: unless-stopped
    networks:
      - mvp_network

networks:
  mvp_network:
    driver: bridge

volumes:
  mysql_data: